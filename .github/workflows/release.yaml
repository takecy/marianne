name: Release

# Triggered by tags pushed from tagging.yaml. Tagging uses a PAT instead
# of GITHUB_TOKEN, which is the only reason this `push: tags` filter
# actually fires (the default token does not chain-trigger workflows).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    # macos-14 is GitHub's Apple Silicon runner; aarch64-apple-darwin
    # cannot be cross-compiled from Intel runners with the current
    # toolchain, and Marianne is published as Apple Silicon only.
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable  # TODO: pin to commit SHA before merge
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tauri-action builds the bundle, signs the updater artifact with
      # TAURI_SIGNING_PRIVATE_KEY, and uploads the artifacts + latest.json
      # to a GitHub Release tagged ${{ github.ref_name }}.
      #
      # releaseDraft: false and prerelease: false are MANDATORY: the
      # updater endpoint is `releases/latest/download/latest.json`, which
      # only resolves draft=false AND prerelease=false. A draft or
      # prerelease here makes the public-facing updater 404 on every
      # check until the release is manually promoted.
      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0  # TODO: pin to commit SHA before merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Marianne ${{ github.ref_name }}'
          releaseBody: |
            See [README](https://github.com/takecy/marianne/blob/main/README.md) for download and installation instructions.

            **Apple Silicon (aarch64) Mac only.** Intel Macs are not supported.

            Existing installations will auto-update on next launch.
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
