name: Tag and Release

# Single source of truth for cutting a release.
#
# Flow: compute next version from Conventional Commits → push tag →
# create draft release with auto-generated notes → build and upload
# signed bundle artifacts (.dmg, .app.tar.gz, .sig, latest.json) via
# tauri-action → verify required assets exist and latest.json is
# valid → publish (gh release edit --draft=false --latest).
#
# Manifest version (package.json / tauri.conf.json / Cargo.toml) is
# intentionally NOT synced with the released tag. The tag version is
# injected into tauri.conf.json on the runner (jq, no commit) so the
# bundled Info.plist's CFBundleShortVersionString and the generated
# latest.json's `version` both reflect the released tag, while main
# stays untouched. This avoids any push to main and sidesteps the
# pull_request + required_status_checks rules on the main branch.
#
# Why draft-then-publish (NOT publish immediately):
# Tauri v2 updater treats no-update as HTTP 204; a 404 (a published
# release whose latest.json has not been uploaded yet) rejects the
# `check()` promise and surfaces "Failed" in the UI for every running
# instance. Keeping the release in draft until all assets land and
# latest.json contents are validated means /releases/latest continues
# to resolve to the previous release for the entire build window.
#
# Why concurrency=tagging-release / cancel-in-progress=false:
# workflow_dispatch can be triggered more than once. Parallel runs
# would race on `--latest`, possibly rolling /releases/latest back
# to an older release after a newer one already shipped. Serializing
# runs avoids the rollback. cancel-in-progress=false (over true)
# avoids leaving partial drafts/tags from a cancelled run that the
# next run would have to clean up.

on:
  workflow_dispatch:
    inputs:
      release_branches:
        description: 'Branches allowed to be tagged (comma-separated, regex supported)'
        type: string
        default: main

concurrency:
  group: tagging-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tagging:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      new_version: ${{ steps.tag_version.outputs.new_version }}
      release_id: ${{ steps.create_release.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      # dry_run defaults to false; the action pushes only a tag ref.
      # Tag refs are outside the main-branch ruleset, so this avoids
      # the GH013 pull_request rule that previously blocked the
      # manifest-bump push to main.
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: ${{ inputs.release_branches }}
          tag_prefix: "v"
          default_bump: "patch"

      # Used as previous_tag_name for generateReleaseNotes. Requires
      # at least one prior published release; v0.1.0 was created
      # manually before this workflow shape was adopted.
      - name: Get latest release
        id: latest_release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          result-encoding: string
          retries: 3
          script: |
            const res = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            return res.data.tag_name;

      # draft: true is MANDATORY (see workflow-header comment about
      # Tauri v2 updater 204 vs 404 semantics). The release stays in
      # draft until the release job's Verify step passes and the
      # Promote step flips draft=false.
      - name: Create draft release with auto-generated notes
        id: create_release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          result-encoding: string
          retries: 3
          script: |
            const note = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: "${{ steps.tag_version.outputs.new_tag }}",
              previous_tag_name: "${{ steps.latest_release.outputs.result }}",
            })
            const res = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: "${{ steps.tag_version.outputs.new_tag }}",
              name: note.data.name,
              body: note.data.body,
              draft: true,
              prerelease: false,
            })
            return String(res.data.id);

  release:
    needs: tagging
    # macos-14 is GitHub's Apple Silicon runner; aarch64-apple-darwin
    # cannot be cross-compiled from Intel runners with the current
    # toolchain, and Marianne is published as Apple Silicon only.
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout (at the new tag)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.tagging.outputs.new_tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Rust toolchain
        # dtolnay/rust-toolchain has no tags; the `stable` branch is
        # the canonical entry point. Pinned to a specific commit on
        # that branch to match the SHA-pin convention used elsewhere
        # in this repo. Bump the SHA + comment when refreshing Rust.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Inject the released tag version into tauri.conf.json on the
      # runner so the bundled Info.plist's CFBundleShortVersionString
      # and the generated latest.json's `version` both match the
      # released tag. main's tauri.conf.json is unaffected.
      - name: Inject release version into tauri.conf.json
        run: |
          jq --arg v "${{ needs.tagging.outputs.new_version }}" '.version = $v' \
            src-tauri/tauri.conf.json > /tmp/conf.json
          mv /tmp/conf.json src-tauri/tauri.conf.json

      # tauri-action uploads the signed bundle (.dmg, .app.tar.gz,
      # .app.tar.gz.sig) and the generated latest.json to the draft
      # release identified by releaseId.
      #
      # releaseName / releaseBody / releaseDraft / prerelease are
      # intentionally NOT passed: those inputs are honored only when
      # tauri-action creates a release. We created it in the tagging
      # job and want the auto-generated release notes preserved.
      - name: Build, sign, and upload assets to draft release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.tagging.outputs.new_tag }}
          releaseId: ${{ needs.tagging.outputs.release_id }}
          args: --target aarch64-apple-darwin

      # tauri-action's latest.json generation warn-and-returns if the
      # signature artifact is missing, so the previous step succeeding
      # does NOT imply latest.json was actually uploaded. Validate the
      # asset set and latest.json contents BEFORE promoting the draft.
      - name: Verify draft release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.tagging.outputs.new_tag }}"
          VERSION="${{ needs.tagging.outputs.new_version }}"

          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          for required in "latest.json" ".app.tar.gz" ".app.tar.gz.sig" ".dmg"; do
            if ! echo "$ASSETS" | grep -q "$required"; then
              echo "::error::missing asset matching: $required"
              exit 1
            fi
          done

          mkdir -p /tmp/release-verify
          gh release download "$TAG" -p "latest.json" -D /tmp/release-verify
          jq -e --arg v "$VERSION" '.version == $v' /tmp/release-verify/latest.json
          jq -e '.platforms["darwin-aarch64"].url' /tmp/release-verify/latest.json
          jq -e '.platforms["darwin-aarch64"].signature | length > 0' /tmp/release-verify/latest.json

      # Promote draft → published only after asset verification passes.
      # --latest atomically flips /releases/latest; the updater plugin
      # will see a complete release on its next check().
      - name: Promote draft release to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.tagging.outputs.new_tag }}" --draft=false --latest
