name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Format check
        run: pnpm fmt:check

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium for Mermaid SSR
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter ./site exec playwright install --with-deps chromium

      - name: Build docs site
        run: pnpm docs:build
        # Verifies the site/ source compiles end-to-end (MDX parsing, Mermaid
        # SSR via Playwright, Pagefind indexing). A strict diff against the
        # committed /docs/ would be ideal but is structurally impossible:
        # Mermaid assigns a fresh `id="mermaid-N"` to every <svg> per build,
        # and Astro's _astro/*.css filenames are content-hashed so any byte
        # difference cascades into new filenames. The build step here at least
        # catches "I forgot to rebuild before commit and the source no longer
        # compiles" — the page-staleness case is left to developer discipline
        # (the getting-started doc spells out `pnpm docs:build` before commit).
